name: Bug report
description: Report reproducible incorrect behavior
title: "[Bug]: "
labels: ["bug", "needs-triage"]
body:
  - type: markdown
    attributes:
      value: Thanks for helping improve Jonex Platform. Remove all credentials and private data before submitting.
  - type: input
    id: version
    attributes:
      label: Version or commit
      placeholder: v0.1.0 or commit SHA
    validations:
      required: true
  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - Frontend
        - API Gateway
        - Sidecar
        - Capability service
        - RAG / ontology
        - Deployment
        - Documentation
        - Other
    validations:
      required: true
  - type: textarea
    id: description
    attributes:
      label: Description
      description: What happened and what did you expect?
    validations:
      required: true
  - type: textarea
    id: reproduce
    attributes:
      label: Reproduction steps
      placeholder: "1. ...\n2. ...\n3. ..."
    validations:
      required: true
  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: OS, Python, Node.js, browser, and deployment mode. Do not paste secrets.
  - type: textarea
    id: logs
    attributes:
      label: Sanitized logs
      render: shell
  - type: checkboxes
    id: checks
    attributes:
      label: Checks
      options:
        - label: I searched existing issues.
          required: true
        - label: I removed credentials, tokens, private URLs, and personal data.
          required: true
        - label: This is not a security vulnerability. Security issues must follow SECURITY.md.
          required: true
