# ============================================================
# platform configuration for this setting.
# ============================================================
# PostgreSQL, Redis, MinIO configuration for this setting.
# Development-only configuration for this setting.
#
# Configuration note for this setting.
#   docker compose -f docker-compose.infra.yml up -d
#   docker compose -f docker-compose.infra.yml logs -f
#   docker compose -f docker-compose.infra.yml down
#
# Port configuration for networks.
# Proxy and routing configuration for networks.
#       5432 (PG)  6379 (Redis)  2379 (etcd)
#       9000 (MinIO S3)  19530 (Milvus gRPC)  9091 (Milvus HTTP)
#       7474 (Neo4j Browser)  7687 (Neo4j Bolt)
# ============================================================

networks:
  jonex-network:
    driver: bridge
    ipam:
      config:
        - subnet: 172.28.0.0/16

volumes:
  jonex-postgres-data:
    driver: local
  jonex-redis-data:
    driver: local
  jonex-etcd-data:
    driver: local
  jonex-minio-data:
    driver: local
  jonex-milvus-data:
    driver: local
  jonex-neo4j-data:
    driver: local
  jonex-neo4j-logs:
    driver: local

services:
  # ============================================================
  # PostgreSQL, database configuration for postgres.
  # ============================================================
  postgres:
    image: postgres:15-alpine
    container_name: jonex-postgres
    hostname: postgres
    networks:
      - jonex-network
    ports:
      - "0.0.0.0:5432:5432"
    environment:
      POSTGRES_USER: ${DB_USERNAME:-jonex}
      POSTGRES_PASSWORD: ${DB_PASSWORD:?Set DB_PASSWORD in deploy/.env}
      POSTGRES_DB: ${DB_NAME:-jonex}
      TZ: Asia/Shanghai
    volumes:
      - jonex-postgres-data:/var/lib/postgresql/data
      - ./postgres/migrations:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME:-jonex} -d ${DB_NAME:-jonex}"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # ============================================================
  # Cache configuration for redis.
  # ============================================================
  redis:
    image: redis:7-alpine
    container_name: jonex-redis
    hostname: redis
    networks:
      - jonex-network
    ports:
      - "0.0.0.0:6379:6379"
    environment:
      TZ: Asia/Shanghai
    volumes:
      - jonex-redis-data:/data
      - ./redis/redis.conf:/usr/local/etc/redis/redis.conf:ro
    command: ["redis-server", "/usr/local/etc/redis/redis.conf"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # ============================================================
  # Milvus, etcd, storage configuration for etcd.
  # ============================================================
  etcd:
    image: quay.io/coreos/etcd:v3.5.18
    container_name: jonex-etcd
    hostname: etcd
    networks:
      - jonex-network
    ports:
      - "0.0.0.0:2379:2379"
    environment:
      ETCD_AUTO_COMPACTION_MODE: revision
      ETCD_AUTO_COMPACTION_RETENTION: "1000"
      ETCD_QUOTA_BACKEND_BYTES: "4294967296"
      ETCD_SNAPSHOT_COUNT: "50000"
      TZ: Asia/Shanghai
    volumes:
      - jonex-etcd-data:/etcd
    command: >
      etcd
      --advertise-client-urls=http://etcd:2379
      --listen-client-urls=http://0.0.0.0:2379
      --data-dir=/etcd
      --initial-advertise-peer-urls=http://etcd:2380
      --listen-peer-urls=http://0.0.0.0:2380
      --initial-cluster=default=http://etcd:2380
    healthcheck:
      test: ["CMD", "etcdctl", "endpoint", "health"]
      interval: 30s
      timeout: 20s
      retries: 3
    restart: unless-stopped

  # ============================================================
  # MinIO, Milvus, object storage configuration for minio.
  # ============================================================
  minio:
    image: minio/minio:RELEASE.2025-04-22T22-12-26Z
    container_name: jonex-minio
    hostname: minio
    networks:
      - jonex-network
    ports:
      - "0.0.0.0:9000:9000"
      - "0.0.0.0:9001:9001"
    environment:
      MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY:?Set MINIO_ACCESS_KEY in deploy/.env}
      MINIO_SECRET_KEY: ${MINIO_SECRET_KEY:?Set MINIO_SECRET_KEY in deploy/.env}
      TZ: Asia/Shanghai
    volumes:
      - jonex-minio-data:/minio_data
    command: minio server /minio_data --console-address ":9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 20s
      retries: 3
    restart: unless-stopped

  # ============================================================
  # database, Milvus configuration for milvus.
  # ============================================================
  milvus:
    image: milvusdb/milvus:v2.5.14
    container_name: jonex-milvus
    hostname: milvus
    networks:
      - jonex-network
    ports:
      - "0.0.0.0:19530:19530"   # gRPC
      - "0.0.0.0:9091:9091"     # HTTP / metrics
    environment:
      TZ: Asia/Shanghai
      ETCD_ENDPOINTS: etcd:2379
      MINIO_ADDRESS: minio:9000
      MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY:?Set MINIO_ACCESS_KEY in deploy/.env}
      MINIO_SECRET_KEY: ${MINIO_SECRET_KEY:?Set MINIO_SECRET_KEY in deploy/.env}
    volumes:
      - jonex-milvus-data:/var/lib/milvus
    command: ["milvus", "run", "standalone"]
    depends_on:
      etcd:
        condition: service_healthy
      minio:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9091/healthz"]
      interval: 30s
      timeout: 20s
      retries: 3
      start_period: 90s
    restart: unless-stopped

  # ============================================================
  # database, Neo4j, ontology configuration for neo4j.
  # ============================================================
  neo4j:
    image: neo4j:5.26-community
    container_name: jonex-neo4j
    hostname: neo4j
    networks:
      - jonex-network
    ports:
      - "0.0.0.0:7474:7474"  # Development-only configuration for environment.
      - "0.0.0.0:7687:7687"  # Configuration note for environment.
    environment:
      NEO4J_AUTH: neo4j/${NEO4J_PASSWORD:?Set NEO4J_PASSWORD in deploy/.env}
      NEO4J_PLUGINS: '["apoc"]'
      NEO4J_server_memory_heap_max__size: ${NEO4J_HEAP:-1G}
      NEO4J_server_memory_pagecache_size: ${NEO4J_PAGECACHE:-512M}
      TZ: Asia/Shanghai
    volumes:
      - jonex-neo4j-data:/data
      - jonex-neo4j-logs:/logs
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:7474 || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 40s
    restart: unless-stopped
