
networks:
  jonex-network:
    driver: bridge
    ipam:
      config:
        - subnet: 172.28.0.0/16

volumes:
  jonex-postgres-data:
    driver: local
  jonex-redis-data:
    driver: local
  jonex-etcd-data:
    driver: local
  jonex-minio-data:
    driver: local
  jonex-milvus-data:
    driver: local
  jonex-rag-storage:
    driver: local
  jonex-rag-inputs:
    driver: local
  jonex-rag-models:
    driver: local
  jonex-logs:
    driver: local
  jonex-neo4j-data:
    driver: local
  jonex-neo4j-logs:
    driver: local

services:

  postgres:
    image: postgres:15-alpine
    container_name: jonex-postgres
    hostname: postgres
    networks:
      - jonex-network
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: ${DB_USERNAME:-jonex}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-jonex123}
      POSTGRES_DB: ${DB_NAME:-jonex}
      TZ: Asia/Shanghai
    volumes:
      - jonex-postgres-data:/var/lib/postgresql/data
      - ./postgres/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME:-jonex} -d ${DB_NAME:-jonex}"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: jonex-redis
    hostname: redis
    networks:
      - jonex-network
    ports:
      - "6379:6379"
    environment:
      TZ: Asia/Shanghai
    volumes:
      - jonex-redis-data:/data
      - ./redis/redis.conf:/usr/local/etc/redis/redis.conf:ro
    command: ["redis-server", "/usr/local/etc/redis/redis.conf"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  etcd:
    image: quay.io/coreos/etcd:v3.5.18
    container_name: jonex-etcd
    hostname: etcd
    networks:
      - jonex-network
    environment:
      ETCD_AUTO_COMPACTION_MODE: revision
      ETCD_AUTO_COMPACTION_RETENTION: "1000"
      ETCD_QUOTA_BACKEND_BYTES: "4294967296"
      ETCD_SNAPSHOT_COUNT: "50000"
      TZ: Asia/Shanghai
    volumes:
      - jonex-etcd-data:/etcd
    command: >
      etcd
      --advertise-client-urls=http://etcd:2379
      --listen-client-urls=http://0.0.0.0:2379
      --data-dir=/etcd
      --initial-advertise-peer-urls=http://etcd:2380
      --listen-peer-urls=http://0.0.0.0:2380
      --initial-cluster=default=http://etcd:2380
    healthcheck:
      test: ["CMD", "etcdctl", "endpoint", "health"]
      interval: 30s
      timeout: 20s
      retries: 3
    restart: unless-stopped

  minio:
    image: minio/minio:RELEASE.2025-04-22T22-12-26Z
    container_name: jonex-minio
    hostname: minio
    networks:
      - jonex-network
    environment:
      MINIO_ACCESS_KEY: minioadmin
      MINIO_SECRET_KEY: minioadmin
      TZ: Asia/Shanghai
    volumes:
      - jonex-minio-data:/minio_data
    command: minio server /minio_data --console-address ":9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 20s
      retries: 3
    restart: unless-stopped

  milvus:
    image: milvusdb/milvus:v2.5.14
    container_name: jonex-milvus
    hostname: milvus
    networks:
      - jonex-network
    ports:
      - "19530:19530"
      - "9091:9091"
    environment:
      TZ: Asia/Shanghai
      ETCD_ENDPOINTS: etcd:2379
      MINIO_ADDRESS: minio:9000
      MINIO_ACCESS_KEY: minioadmin
      MINIO_SECRET_KEY: minioadmin
    volumes:
      - jonex-milvus-data:/var/lib/milvus
    command: ["milvus", "run", "standalone"]
    depends_on:
      etcd:
        condition: service_healthy
      minio:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9091/healthz"]
      interval: 30s
      timeout: 20s
      retries: 3
      start_period: 90s
    restart: unless-stopped

  knowledge-base-service:
    build:
      context: ..
      dockerfile: deploy/docker/capability.Dockerfile
      args:
        CAPABILITY_NAME: knowledge_base
    container_name: jonex-knowledge-base
    hostname: knowledge-base
    networks:
      - jonex-network
    ports:
      - "8003:8000"
    environment:
      TZ: Asia/Shanghai
      CAPABILITY_NAME: knowledge_base
      SERVICE_ENDPOINT: http://knowledge-base-service:8000
      LOG_LEVEL: INFO
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USERNAME: ${DB_USERNAME:-jonex}
      DB_PASSWORD: ${DB_PASSWORD:-jonex123}
      DB_NAME: ${DB_NAME:-jonex}
      REDIS_URL: redis://redis:6379/0

      SIDECAR_URL: http://sidecar:8000
      CAPABILITY_RUNTIME_FILE: /app/config/capability_runtime.yaml

      NEO4J_URI: bolt://neo4j:7687
      NEO4J_USERNAME: neo4j
      NEO4J_PASSWORD: ${NEO4J_PASSWORD:-jonex_neo4j_123}
      NEO4J_ONTOLOGY_LABEL: OntologyEntity

      ONTOLOGY_LLM_BINDING_HOST: ${ONTOLOGY_LLM_BINDING_HOST:-https://tokenhub.tencentmaas.com/v1}
      ONTOLOGY_LLM_BINDING_API_KEY: ${LLM_BINDING_API_KEY_FOR_ONTOLOGY:-${LLM_BINDING_API_KEY:-}}
      ONTOLOGY_LLM_MODEL: ${ONTOLOGY_LLM_MODEL:-deepseek-v4-flash}
    env_file:
      - .env
    volumes:
      - jonex-logs:/app/logs
      - ./config/capability_runtime.yaml:/app/config/capability_runtime.yaml:ro
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      neo4j:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    restart: unless-stopped

  sidecar:
    build:
      context: ..
      dockerfile: deploy/docker/sidecar.Dockerfile
    container_name: jonex-sidecar
    hostname: sidecar
    networks:
      - jonex-network
    expose:
      - "8000"
    environment:
      TZ: Asia/Shanghai
      LOG_LEVEL: INFO
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USERNAME: ${DB_USERNAME:-jonex}
      DB_PASSWORD: ${DB_PASSWORD:-jonex123}
      DB_NAME: ${DB_NAME:-jonex}
      REDIS_URL: redis://redis:6379/0
      KNOWLEDGE_BASE_URL: http://knowledge-base-service:8000
      ATOMIC_RAG_URL: http://atomic-rag:8000
      JWT_SECRET: ${JWT_SECRET}
      LOGIN_TICKET_EXPIRE_SECONDS: ${LOGIN_TICKET_EXPIRE_SECONDS:-60}
      AUTH_ALLOWED_REDIRECT_URIS: ${AUTH_ALLOWED_REDIRECT_URIS:-{}}
      WORKERS: 4
    env_file:
      - .env
    volumes:
      - jonex-logs:/app/logs
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      knowledge-base-service:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    restart: unless-stopped

  gateway:
    build:
      context: ..
      dockerfile: deploy/docker/gateway.Dockerfile
    container_name: jonex-gateway
    hostname: gateway
    networks:
      - jonex-network
    ports:
      - "8000:8000"
    expose:
      - "8000"
    environment:
      TZ: Asia/Shanghai
      LOG_LEVEL: INFO
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USERNAME: ${DB_USERNAME:-jonex}
      DB_PASSWORD: ${DB_PASSWORD:-jonex123}
      DB_NAME: ${DB_NAME:-jonex}
      REDIS_URL: redis://redis:6379/0
      SIDECAR_URL: http://sidecar:8000
      KB_INPUT_DIR: /app/inputs
      AUTH_CORS_ORIGINS: ${AUTH_CORS_ORIGINS:-}
    volumes:
      - jonex-logs:/app/logs
      - jonex-rag-inputs:/app/inputs
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      sidecar:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    restart: unless-stopped

  frontend-gateway:
    build:
      context: ..
      dockerfile: deploy/docker/frontend-gateway.Dockerfile
    container_name: jonex-frontend-gateway
    hostname: frontend-gateway
    networks:
      - jonex-network
    ports:
      - "${FRONTEND_PORT:-80}:80"
    depends_on:
      shell-frontend:
        condition: service_started
      core-business-frontend:
        condition: service_started
      platform-management-frontend:
        condition: service_started
      ecosystem-management-frontend:
        condition: service_started
      gateway:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://127.0.0.1/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 5s
    restart: unless-stopped

  shell-frontend:
    build:
      context: ..
      dockerfile: frontends/shell/Dockerfile
    container_name: jonex-shell-frontend
    hostname: shell-frontend
    networks:
      - jonex-network
    expose:
      - "80"
    environment:
      TZ: Asia/Shanghai
      API_BASE_URL: ${FRONTEND_API_BASE_URL:-http://gateway:8000}
      ENV: production
      VITE_ALLOWED_REDIRECT_ORIGINS: ${VITE_ALLOWED_REDIRECT_ORIGINS:-}
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://127.0.0.1/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    restart: unless-stopped

  core-business-frontend:
    build:
      context: ..
      dockerfile: frontends/core-business/Dockerfile
    container_name: jonex-core-business-frontend
    hostname: core-business-frontend
    networks:
      - jonex-network
    expose:
      - "80"
    environment:
      TZ: Asia/Shanghai
      API_BASE_URL: ${FRONTEND_API_BASE_URL:-http://gateway:8000}
      ENV: production
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://127.0.0.1/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    restart: unless-stopped

  platform-management-frontend:
    build:
      context: ..
      dockerfile: frontends/platform-management/Dockerfile
    container_name: jonex-platform-management-frontend
    hostname: platform-management-frontend
    networks:
      - jonex-network
    expose:
      - "80"
    environment:
      TZ: Asia/Shanghai
      API_BASE_URL: ${FRONTEND_API_BASE_URL:-http://gateway:8000}
      ENV: production
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://127.0.0.1/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    restart: unless-stopped

  ecosystem-management-frontend:
    build:
      context: ..
      dockerfile: frontends/ecosystem-management/Dockerfile
    container_name: jonex-ecosystem-management-frontend
    hostname: ecosystem-management-frontend
    networks:
      - jonex-network
    expose:
      - "80"
    environment:
      TZ: Asia/Shanghai
      API_BASE_URL: ${FRONTEND_API_BASE_URL:-http://gateway:8000}
      ENV: production
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://127.0.0.1/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    restart: unless-stopped

  lightrag:
    build:
      context: ..
      dockerfile: deploy/docker/lightrag-source.Dockerfile
    container_name: jonex-lightrag
    hostname: lightrag
    image: jonex-lightrag-source
    networks:
      - jonex-network
    expose:
      - "9621"
    env_file:
      - .env.rag
    volumes:
      - jonex-rag-storage:/app/data/rag_storage
      - jonex-rag-inputs:/app/data/inputs
    extra_hosts:
      - "host.docker.internal:host-gateway"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:9621/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    restart: unless-stopped
    depends_on:
      neo4j:
        condition: service_healthy

  atomic-rag:
    build:
      context: ..
      dockerfile: deploy/docker/atomic-rag.Dockerfile
      args:
        MINERU_SOURCE: ${MINERU_SOURCE:-modelscope}
    container_name: jonex-atomic-rag
    hostname: atomic-rag
    networks:
      - jonex-network
    expose:
      - "8000"
    env_file:
      - .env
    environment:

      SERVICE_PORT: "8000"
      SERVICE_ENDPOINT: http://atomic-rag:8000
      TZ: Asia/Shanghai

      RAG_PARSER: ${RAG_PARSER:-mineru}
      PARSE_METHOD: ${PARSE_METHOD:-auto}
      MINERU_BACKEND: ${MINERU_BACKEND:-}
      MINERU_TIMEOUT_SECONDS: ${MINERU_TIMEOUT_SECONDS:-1800}
      OUTPUT_DIR: /app/output
      WORKING_DIR: /app/rag_storage
      LIGHTRAG_STORAGE_DIR: /app/rag_storage
      RAG_WORKER_NUM: ${RAG_WORKER_NUM:-2}
      MINERU_SOURCE: ${MINERU_SOURCE:-modelscope}
      WHISPER_MODEL: ${WHISPER_MODEL:-base}
      RAG_TEXT_CHUNK_CHARS: ${RAG_TEXT_CHUNK_CHARS:-12000}
      RAG_REQUIRE_DOC_IDS: ${RAG_REQUIRE_DOC_IDS:-true}
      RAG_TRACK_STATUS_RETRIES: ${RAG_TRACK_STATUS_RETRIES:-180}
      RAG_TRACK_STATUS_DELAY_SECONDS: ${RAG_TRACK_STATUS_DELAY_SECONDS:-2}
      TORCH_SHOW_CPP_STACKTRACES: ${TORCH_SHOW_CPP_STACKTRACES:-0}
      OMP_NUM_THREADS: ${OMP_NUM_THREADS:-8}
      MKL_NUM_THREADS: ${MKL_NUM_THREADS:-8}

      VISION_BINDING_HOST: ${VISION_BINDING_HOST:-${LLM_BINDING_HOST:-}}
      VISION_BINDING_API_KEY: ${VISION_BINDING_API_KEY:-${LLM_BINDING_API_KEY:-}}
      LLM_BINDING_HOST: ${LLM_BINDING_HOST:-}
      LLM_BINDING_API_KEY: ${LLM_BINDING_API_KEY:-}

      LIGHTRAG_API_URL: http://lightrag:9621
      LIGHTRAG_API_KEY: ${LIGHTRAG_API_KEY}
      LIGHTRAG_API_TIMEOUT: "300"

      RAG_WEBHOOK_URL: ${RAG_WEBHOOK_URL:-}

      ONTOLOGY_EXTRACT_ENABLED: ${ONTOLOGY_EXTRACT_ENABLED:-false}
      ONTOLOGY_SCHEMA_PATH: ${ONTOLOGY_SCHEMA_PATH:-/app/deploy/config/ontology/default.yaml}
      ONTOLOGY_EXTRACT_MAX_RETRIES: ${ONTOLOGY_EXTRACT_MAX_RETRIES:-3}
      ONTOLOGY_LLM_BINDING_HOST: ${LLM_BINDING_HOST_FOR_ONTOLOGY:-https://tokenhub.tencentmaas.com/v1}
      ONTOLOGY_LLM_BINDING_API_KEY: ${LLM_BINDING_API_KEY_FOR_ONTOLOGY:-${LLM_BINDING_API_KEY:-}}
      ONTOLOGY_LLM_MODEL: ${LLM_MODEL_FOR_ONTOLOGY:-deepseek-v4-flash}
      ONTOLOGY_LLM_TIMEOUT: ${ONTOLOGY_LLM_TIMEOUT:-60}
      ONTOLOGY_EXTRACT_MAX_ENTITIES: ${ONTOLOGY_EXTRACT_MAX_ENTITIES:-200}
      ONTOLOGY_EXTRACT_MAX_CHUNKS: ${ONTOLOGY_EXTRACT_MAX_CHUNKS:-50}
      ONTOLOGY_EXTRACT_MAX_TOKENS: ${ONTOLOGY_EXTRACT_MAX_TOKENS:-4096}

    volumes:
      - jonex-rag-storage:/app/rag_storage
      - jonex-rag-inputs:/app/inputs
      - jonex-rag-models:/root/.cache
      - ./config/ontology:/app/deploy/config/ontology:ro
    depends_on:
      lightrag:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 300s
    restart: unless-stopped

  neo4j:
    image: neo4j:5.26-community
    container_name: jonex-neo4j
    hostname: neo4j
    networks:
      - jonex-network
    ports:
      - "7474:7474"
      - "7687:7687"
    environment:
      NEO4J_AUTH: neo4j/${NEO4J_PASSWORD:-jonex_neo4j_123}
      NEO4J_PLUGINS: '["apoc"]'
      NEO4J_server_memory_heap_max__size: ${NEO4J_HEAP:-1G}
      NEO4J_server_memory_pagecache_size: ${NEO4J_PAGECACHE:-512M}
      TZ: Asia/Shanghai
    volumes:
      - jonex-neo4j-data:/data
      - jonex-neo4j-logs:/logs
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:7474 || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 40s
    restart: unless-stopped
